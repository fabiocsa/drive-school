server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/drive_school?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: never
      encoding: UTF-8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: enabled
      logic-delete-value: 0
      logic-not-delete-value: 1

jwt:
  secret: DriveSchoolSecretKey2024ForJWTTokenGenerationAndValidation
  expiration: 86400000

file:
  upload:
    path: ./uploads/
    allowed-extensions: jpg,jpeg,png,pdf

pdf:
  output:
    path: ./pdfs/
